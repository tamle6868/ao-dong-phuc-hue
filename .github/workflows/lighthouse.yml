name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Audit (mobile, gate ≥ 95)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (production)
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI
        run: |
          pnpm dlx @lhci/cli@0.14.x autorun \
            --collect.startServerCommand="pnpm start --port 3000" \
            --collect.startServerReadyPattern="Ready" \
            --collect.numberOfRuns=1 \
            --collect.url="http://localhost:3000/" \
            --collect.url="http://localhost:3000/san-pham" \
            --collect.url="http://localhost:3000/san-pham/ao-bong-da-pro-elite" \
            --collect.url="http://localhost:3000/landing/ao-bong-da-thiet-ke" \
            --collect.url="http://localhost:3000/landing/dong-phuc-doanh-nghiep" \
            --collect.settings.preset=desktop \
            --assert.assertions.categories:performance="[\"error\",{\"minScore\":0.95}]" \
            --assert.assertions.categories:accessibility="[\"error\",{\"minScore\":0.95}]" \
            --assert.assertions.categories:best-practices="[\"error\",{\"minScore\":0.95}]" \
            --assert.assertions.categories:seo="[\"error\",{\"minScore\":0.95}]" \
            --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
